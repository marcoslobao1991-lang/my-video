name: Render Slides Only (fast)
on: [workflow_dispatch]
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx remotion render src/index.ts slides-only out/slides-only.mp4 --image-format=jpeg --jpeg-quality=90 --concurrency=2 --timeout=60000
      - uses: actions/upload-artifact@v4
        with:
          name: slides-only
          path: out/slides-only.mp4
          retention-days: 7
